<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JARVIS</title>
<!-- SiriWave bundled locally (offline, no CDN) -->
<script src="/gui-assets/siriwave.umd.min.js"></script>
<style>
  :root {
    --jarvis: #36e0ff;
    --jarvis-dim: #1b6f80;
    --idle: #36e0ff;
    --listening: #34f5a0;
    --thinking: #ffd23d;
    --speaking: #ff5db1;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: #000; color: #fff; overflow: hidden;
    font-family: "Segoe UI", Roboto, system-ui, sans-serif;
    user-select: none; -webkit-user-select: none;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
  }
  /* Title */
  #title {
    position: fixed; top: 26px; left: 0; right: 0; text-align: center;
    font-size: 14px; letter-spacing: 10px; color: var(--jarvis);
    text-shadow: 0 0 14px var(--jarvis); opacity: .9; pointer-events: none;
  }
  /* The wave */
  #siri-wave { width: 100%; height: 320px; max-width: 1100px; }
  /* Status + transcript */
  #status {
    margin-top: 6px; font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    text-shadow: 0 0 12px currentColor; transition: color .25s; opacity: .9;
  }
  #transcript {
    margin: 16px auto 0; max-width: 760px; min-height: 28px; font-size: 20px;
    line-height: 1.4; text-align: center; text-shadow: 0 0 10px currentColor;
    opacity: .95; padding: 0 22px; color: #eafcff;
  }
  #notice {
    position: fixed; bottom: 14px; left: 0; right: 0; text-align: center;
    font-size: 11px; letter-spacing: 1px; opacity: .4; pointer-events: none;
  }
  /* Controls */
  #bar {
    position: fixed; top: 16px; right: 16px; display: flex; gap: 8px;
  }
  .btn {
    background: rgba(54,224,255,.08); border: 1px solid var(--jarvis-dim);
    color: var(--jarvis); font-size: 11px; letter-spacing: 1px; padding: 6px 10px;
    border-radius: 4px; cursor: pointer; text-transform: uppercase;
    backdrop-filter: blur(4px);
  }
  .btn:hover { background: rgba(54,224,255,.18); }
  .btn.on { background: rgba(54,224,255,.25); color: #aef6ff; }
  #hint {
    position: fixed; top: 16px; left: 16px; font-size: 11px; letter-spacing: 1px;
    color: var(--jarvis); opacity: .45; pointer-events: none;
  }
</style>
</head>
<body>
  <div id="title">J.A.R.V.I.S</div>
  <div id="hint">// voice desktop control</div>
  <div id="bar">
    <select id="model" class="btn" title="Select model / provider">
      <option value="">model…</option>
    </select>
    <button class="btn" id="mic">Mic: off</button>
    <button class="btn" id="handsfree">Hands-free: off</button>
  </div>

  <div id="siri-wave"></div>
  <div id="status">initializing</div>
  <div id="transcript"></div>
  <div id="notice">offline-ready &middot; say &ldquo;Jarvis&rdquo; or press Mic</div>

<script>
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const micBtn = document.getElementById('mic');
const hfBtn = document.getElementById('handsfree');

// ---- SiriWave (the iconic thevickypedia/Jarvis look) -----------------------
const siriWave = new SiriWave({
  container: document.getElementById('siri-wave'),
  width: Math.min(window.innerWidth, 1100),
  height: 320,
  style: 'ios9',
  speed: 0.18,
  amplitude: 0.02,
  frequency: 6,
  color: '#36e0ff',
  autostart: true,
  cover: true,
});

// ---- State -> wave mapping (our "interactive pulse") -----------------------
const STATES = {
  idle:      { color: '#36e0ff', amp: 0.02, speed: 0.12 },
  listening: { color: '#34f5a0', amp: 1.0,  speed: 0.28 },
  thinking:  { color: '#ffd23d', amp: 0.55, speed: 0.20 },
  speaking:  { color: '#ff5db1', amp: 0.9,  speed: 0.34 },
};
let state = 'idle';
let energy = 0;

function applyState(s) {
  if (!STATES[s]) return;
  state = s;
  const cfg = STATES[s];
  siriWave.setColors([cfg.color]);
  statusEl.textContent = s;
  statusEl.style.color = cfg.color;
  // base amplitude for the state, modulated by live energy when available
  const base = cfg.amp;
  const amp = base <= 0.05 ? 0.02 : base * (0.7 + 0.6 * energy);
  siriWave.setAmplitude(amp);
  siriWave.setSpeed(cfg.speed);
}
function setTranscript(t) { transcriptEl.textContent = t; }

// ---- Comms ----------------------------------------------------------------
let ws = null;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    switch (m.type) {
      case 'state':
        applyState(m.state);
        if (m.transcript) setTranscript(m.transcript);
        if (typeof m.energy === 'number') energy = Math.max(0, Math.min(1, m.energy));
        break;
      case 'transcript': setTranscript(m.text); break;
      case 'energy': energy = Math.max(0, Math.min(1, m.value)); break;
      case 'speak': applyState('speaking'); setTranscript(m.text); break;
      case 'heard': applyState('thinking'); setTranscript(m.text); break;
      case 'reply': applyState('idle'); break;
    }
    if (m.voice_available === false) {
      document.getElementById('notice').textContent =
        'voice input not installed &middot; pip install vosk + model';
    } else if (m.provider === 'local') {
      document.getElementById('notice').textContent =
        'running on built-in local brain (no API key)';
    }
  };
  ws.onclose = () => { setTimeout(connect, 1500); };
}
connect();

micBtn.onclick = async () => {
  const micOn = !micBtn.classList.contains('on');
  micBtn.classList.toggle('on', micOn);
  micBtn.textContent = 'Mic: ' + (micOn ? 'on' : 'off');
  if (micOn) applyState('listening'); else applyState('idle');
  try {
    await fetch('/listen', { method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ on: micOn, mode: hfBtn.classList.contains('on') ? 'continuous' : 'wake' }) });
  } catch (e) {}
};
const modelSel = document.getElementById('model');

async function loadModels() {
  try {
    const data = await (await fetch('/models')).json();
    const cur = data.current || '';
    modelSel.innerHTML = '';
    const ph = document.createElement('option');
    ph.value = ''; ph.textContent = 'model…'; modelSel.appendChild(ph);
    for (const m of (data.models || [])) {
      const opt = document.createElement('option');
      opt.value = JSON.stringify({ provider: m.provider, model: m.model });
      opt.textContent = m.label;
      if (m.model === cur) opt.selected = true;
      modelSel.appendChild(opt);
    }
  } catch (e) { /* models endpoint optional */ }
}
modelSel.onchange = async () => {
  const raw = modelSel.value;
  if (!raw) return;
  try {
    const sel = JSON.parse(raw);
    const r = await fetch('/select_model', { method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(sel) });
    const j = await r.json();
    document.getElementById('notice').textContent =
      `model: ${j.model || ''}` + (j.provider ? `  ·  ${j.provider}` : '');
  } catch (e) {}
};
loadModels();

hfBtn.onclick = async () => {
  const hfOn = !hfBtn.classList.contains('on');
  hfBtn.classList.toggle('on', hfOn);
  hfBtn.textContent = 'Hands-free: ' + (hfOn ? 'on' : 'off');
  try {
    await fetch('/toggle_confirm', { method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ enabled: hfOn }) });
  } catch (e) {}
};
</script>
</body>
</html>
