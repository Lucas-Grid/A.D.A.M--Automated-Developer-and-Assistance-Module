<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JARVIS</title>
<style>
  :root { --jarvis: #36e0ff; --jarvis-dim: #1b6f80; --bg: #02060a; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: radial-gradient(circle at 50% 40%, #04121a 0%, #02060a 70%);
    color: var(--jarvis); font-family: "Segoe UI", Roboto, system-ui, sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
  #overlay {
    position: fixed; left: 0; right: 0; bottom: 0; padding: 0 0 26px; text-align: center;
    pointer-events: none;
  }
  #status {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase; opacity: .85;
    text-shadow: 0 0 12px var(--jarvis); transition: color .25s;
  }
  #transcript {
    margin: 14px auto 0; max-width: 720px; min-height: 26px; font-size: 19px; line-height: 1.4;
    text-shadow: 0 0 10px var(--jarvis); opacity: .95; padding: 0 20px;
  }
  #hint {
    position: fixed; top: 14px; left: 16px; font-size: 11px; letter-spacing: 1px;
    opacity: .45; pointer-events: none;
  }
  #bar {
    position: fixed; top: 12px; right: 16px; display: flex; gap: 8px; pointer-events: auto;
  }
  .btn {
    background: rgba(54,224,255,.08); border: 1px solid var(--jarvis-dim); color: var(--jarvis);
    font-size: 11px; letter-spacing: 1px; padding: 6px 10px; border-radius: 4px; cursor: pointer;
    text-transform: uppercase; backdrop-filter: blur(4px);
  }
  .btn:hover { background: rgba(54,224,255,.18); }
  .btn.on { background: rgba(54,224,255,.25); color: #aef6ff; }
</style>
</head>
<body>
  <div id="stage"><canvas id="holo"></canvas></div>
  <div id="hint">J.A.R.V.I.S // voice desktop control</div>
  <div id="bar">
    <button class="btn" id="mic">Mic: off</button>
    <button class="btn" id="handsfree">Hands-free: off</button>
  </div>
  <div id="overlay">
    <div id="status">initializing</div>
    <div id="transcript"></div>
  </div>

<script>
const canvas = document.getElementById('holo');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const micBtn = document.getElementById('mic');
const hfBtn = document.getElementById('handsfree');

let DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  canvas.width = window.innerWidth * DPR;
  canvas.height = window.innerHeight * DPR;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize); resize();

// ---- Hologram state machine ----------------------------------------------
// states: idle | listening | thinking | speaking
let state = 'idle';
let pulse = 0;          // master animation clock
let energy = 0;         // 0..1 audio/reactive energy
let rot = 0;
const STATE_COLORS = {
  idle:     { a: '#36e0ff', b: '#1b6f80' },
  listening:{ a: '#3dff9e', b: '#1d6b46' },
  thinking: { a: '#ffd23d', b: '#7a5e10' },
  speaking: { a: '#ff5db1', b: '#7a1d54' },
};
function setState(s) {
  state = STATE_COLORS[s] ? s : state;
  statusEl.textContent = state;
  statusEl.style.color = STATE_COLORS[state].a;
}
function setTranscript(t) { transcriptEl.textContent = t; }

// ---- Render ---------------------------------------------------------------
function ring(cx, cy, r, color, lw, alpha) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.globalAlpha = alpha;
  ctx.stroke();
  ctx.globalAlpha = 1;
}
function arc(cx, cy, r, a0, a1, color, lw, alpha) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, a0, a1);
  ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.globalAlpha = alpha; ctx.stroke();
  ctx.globalAlpha = 1;
}

function draw() {
  pulse += 0.016;
  rot += 0.004 + energy * 0.02;
  const W = window.innerWidth, H = window.innerHeight;
  const cx = W / 2, cy = H / 2 - 30;
  const base = Math.min(W, H) * 0.20;
  const c = STATE_COLORS[state];
  ctx.clearRect(0, 0, W, H);

  // outer pulse rings (the "interactive pulse")
  for (let i = 0; i < 3; i++) {
    const phase = (pulse * 0.6 + i / 3) % 1;
    const r = base * (0.6 + phase * 1.8);
    const alpha = (1 - phase) * (state === 'idle' ? 0.35 : 0.6);
    ring(cx, cy, r, c.a, 2, alpha * 0.5);
  }

  // rotating HUD arcs
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  for (let k = 0; k < 3; k++) {
    const rr = base * (0.85 + k * 0.16);
    const off = (k * Math.PI * 2) / 3;
    arc(0, 0, rr, off, off + Math.PI * (0.7 + 0.25 * Math.sin(pulse + k)), c.a, 2.4, 0.85);
    arc(0, 0, rr, off + Math.PI, off + Math.PI * 1.7, c.b, 1.6, 0.6);
  }
  ctx.restore();

  // core core ring + breathing core
  ring(cx, cy, base * 0.55, c.a, 2, 0.9);
  const breath = base * 0.30 * (1 + 0.08 * Math.sin(pulse * 2)) + energy * base * 0.12;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, breath);
  grad.addColorStop(0, c.a); grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.55; ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, breath, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // tick marks
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(-rot * 1.5);
  for (let i = 0; i < 60; i++) {
    const a = (i / 60) * Math.PI * 2;
    const r1 = base * 0.62, r2 = base * (i % 5 === 0 ? 0.70 : 0.66);
    arc(0, 0, (r1 + r2) / 2, a, a + 0.001, c.b, 1, i % 5 === 0 ? 0.8 : 0.4);
  }
  ctx.restore();

  // sweeping radar line (active when listening/thinking)
  if (state === 'listening' || state === 'thinking') {
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot * 3);
    const g2 = ctx.createLinearGradient(0, 0, base, 0);
    g2.addColorStop(0, c.a); g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.strokeStyle = g2; ctx.lineWidth = 2; ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(base * 1.5, 0); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  }
  requestAnimationFrame(draw);
}
draw();

// ---- Comms ----------------------------------------------------------------
let ws = null;
let micOn = false, hfOn = false;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    switch (m.type) {
      case 'state':   setState(m.state); break;
      case 'transcript': setTranscript(m.text); break;
      case 'energy': energy = Math.max(0, Math.min(1, m.value)); break;
      case 'speak': setState('speaking'); setTranscript(m.text); break;
      case 'heard': setState('thinking'); setTranscript(m.text); break;
      case 'reply': setState('idle'); break;
    }
  };
  ws.onclose = () => { setTimeout(connect, 1500); };
}
connect();

micBtn.onclick = async () => {
  micOn = !micOn;
  micBtn.textContent = 'Mic: ' + (micOn ? 'on' : 'off');
  micBtn.classList.toggle('on', micOn);
  try {
    await fetch('/listen', { method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ on: micOn, mode: hfOn ? 'continuous' : 'wake' }) });
  } catch (e) {}
};
hfBtn.onclick = async () => {
  hfOn = !hfOn;
  hfBtn.textContent = 'Hands-free: ' + (hfOn ? 'on' : 'off');
  hfBtn.classList.toggle('on', hfOn);
  try {
    await fetch('/toggle_confirm', { method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ enabled: hfOn }) });
  } catch (e) {}
};

// click anywhere on the hologram to push a test command via keyboard mic toggle
// (kept simple: real voice handled server-side)
</script>
</body>
</html>
