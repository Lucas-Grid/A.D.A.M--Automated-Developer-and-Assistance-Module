name: Jarvis Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run offline test suite
        run: python tests/run_tests.py -v
      - name: Run offline demo (proves offline-first no-key startup)
        run: python -m jarvis.demo
      - name: Run mocked NIM end-to-end pipeline
        run: python tests/run_tests.py nim_e2e
