version: 1
disable_existing_loggers: false
formatters:
  default:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    level: INFO
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: default
    filename: logs/adam.log
    maxBytes: 10485760
    backupCount: 5
    level: DEBUG
root:
  level: DEBUG
  handlers: [console, file]
